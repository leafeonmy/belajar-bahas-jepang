<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Kursus Bahasa Jepang</title>

  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: #f5f5f5;
    }

    header {
      background: #d32f2f;
      color: white;
      padding: 15px;
      text-align: center;
    }

    nav a {
      color: white;
      margin: 10px;
      text-decoration: none;
    }

    .hero {
      text-align: center;
      padding: 40px;
      background: #fff;
    }

    section {
      padding: 20px;
    }

    .card {
      background: white;
      margin: 10px auto;
      padding: 15px;
      width: 300px;
      border-radius: 10px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    .quiz-box {
      text-align: center;
    }

    button {
      display: block;
      margin: 10px auto;
      padding: 10px;
      border: none;
      background: #d32f2f;
      color: white;
      border-radius: 5px;
      cursor: pointer;
    }

    button:hover {
      background: #b71c1c;
    }

    footer {
      text-align: center;
      padding: 15px;
      background: #222;
      color: white;
    }
  </style>

</head>
<body>

<header>
  <h1>🇯🇵 Kursus Bahasa Jepang</h1>
  <nav>
    <a href="#materi">Materi</a>
    <a href="#quiz">Quiz</a>
  </nav>
</header>

<section class="hero">
  <h2>Belajar Jepang dari Dasar</h2>
  <p>Hiragana • Katakana • Percakapan</p>
</section>

<section id="materi">
  <h2>📚 Materi</h2>

  <div class="card">
    <h3>Salam</h3>
    <p>おはよう = Selamat pagi</p>
    <p>こんにちは = Selamat siang</p>
    <p>こんばんは = Selamat malam</p>
  </div>

  <div class="card">
    <h3>Perkenalan</h3>
    <p>はじめまして</p>
    <p>わたしはQodirです</p>
  </div>

  <div class="card">
    <h3>Angka</h3>
    <p>1 = いち</p>
    <p>2 = に</p>
    <p>3 = さん</p>
  </div>

</section>

<section id="quiz">
  <h2>📝 Quiz</h2>

  <div class="quiz-box">
    <p>Apa arti "おはよう"?</p>
    <button onclick="checkAnswer('a')">Selamat pagi</button>
    <button onclick="checkAnswer('b')">Selamat malam</button>
    <button onclick="checkAnswer('c')">Terima kasih</button>
    <p id="result"></p>
  </div>

</section>

<footer>
  <p>© 2026 Kursus Jepang</p>
</footer>

<script>
  function checkAnswer(answer) {
    const result = document.getElementById("result");

    if (answer === 'a') {
      result.innerHTML = "✅ Benar!";
      result.style.color = "green";
    } else {
      result.innerHTML = "❌ Salah!";
      result.style.color = "red";
    }
  }
</script>

</body>
</html>
