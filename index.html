<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Kursus Bahasa Jepang</title>

  <style>
.flashcard-container {
  display: flex;
  justify-content: center;
  flex-wrap: wrap;
  gap: 15px;
}

.flashcard {
  width: 80px;
  height: 100px;
  perspective: 1000px;
  cursor: pointer;
}

.inner {
  width: 100%;
  height: 100%;
  position: relative;
  transition: transform 0.6s;
  transform-style: preserve-3d;
}

.flashcard.flip .inner {
  transform: rotateY(180deg);
}

.front, .back {
  position: absolute;
  width: 100%;
  height: 100%;
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 24px;
  backface-visibility: hidden;
}

.front {
  background: white;
}

.back {
  background: #d32f2f;
  color: white;
  transform: rotateY(180deg);
}
  </style>

</head>
<body>

<section id="flashcard">
  <h2>🧠 Flashcard Hiragana</h2>

  <div class="flashcard-container">

    <div class="flashcard" onclick="flipCard(this)">
      <div class="inner">
        <div class="front">あ</div>
        <div class="back">A</div>
      </div>
    </div>

    <div class="flashcard" onclick="flipCard(this)">
      <div class="inner">
        <div class="front">い</div>
        <div class="back">I</div>
      </div>
    </div>

    <div class="flashcard" onclick="flipCard(this)">
      <div class="inner">
        <div class="front">う</div>
        <div class="back">U</div>
      </div>
    </div>

    <div class="flashcard" onclick="flipCard(this)">
      <div class="inner">
        <div class="front">え</div>
        <div class="back">E</div>
      </div>
    </div>

    <div class="flashcard" onclick="flipCard(this)">
      <div class="inner">
        <div class="front">お</div>
        <div class="back">O</div>
      </div>
    </div>

  </div>
</section>

<script>
function flipCard(card) {
  card.classList.toggle("flip");
}
</script>

</body>
</html>
